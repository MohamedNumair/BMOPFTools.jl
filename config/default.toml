# BMOPFTools default configuration
#
# Tunable thresholds for the analysis, validation, and augmentation passes.
# These are *defaults*; they are loaded once at package load time into
# `BMOPFTools._DEFAULT_CONFIG`. To override them for a particular study,
# copy this file, edit the values you care about, and pass it via
# `load_config("my.toml")` to the relevant entry point's `config=` keyword
# (e.g. `analyze(net; config=load_config("my.toml"))`).
#
# Only values that a user might reasonably want to tune per-network or
# per-study live here. Schema-level facts (terminal maps, the IEC conductor
# ampacity table, field-name sets, regexes) stay in the source code, since
# changing them would be a correctness bug, not a preference.

# ---------------------------------------------------------------------------
# Domain plausibility checks  (validation/domain_rules.jl)
# ---------------------------------------------------------------------------
[domain_rules]
# Power factor: warn on loads below this
pf_min = 0.70
# Generator cost: flag if unrealistically high ($/kWh)
cost_max_per_kwh = 10.0
# Line series resistance: Ω/m; flag near-zero diagonal
r_series_min = 1e-9
# Transformer: max step ratio in either direction (anything beyond 1000:1
# is suspect; 33/0.4 kV ≈ 83, 132/11 kV = 12)
xfmr_ratio_max = 1000.0
# Absolute series impedance ||Z||_F (Ω) below which a line should be a switch
z_line_min_ohm = 1e-4
# Adjacent-line ||Z||_F ratio thresholds (info / warning)
z_spread_info = 1e3
z_spread_warn = 1e5
# Source voltage headroom: warn if a voltage source's fixed v_magnitude is
# within this fraction of the (v_max - v_min) band from either bound, on the
# source bus or a same-base neighbour (risk of OPF infeasibility)
source_v_margin_frac = 0.05

# ---------------------------------------------------------------------------
# Thermal-rating inference  (augmentation/thermal.jl)
# ---------------------------------------------------------------------------
[thermal]
# Relative tolerance for matching R₁₁ against the IEC ampacity lookup table
tolerance = 0.15

# ---------------------------------------------------------------------------
# Provenance: neutral-earthing classification  (provenance/wires_grounding.jl)
# ---------------------------------------------------------------------------
[provenance.grounding]
# |Z| (Ω) below this at a bus: "solid" earth
earth_solid_ohm = 1.0
# |Z| (Ω) above this (or absent): isolated (I) system
earth_isolated_ohm = 200.0

# ---------------------------------------------------------------------------
# Provenance: OpenDSS default-value fingerprints  (provenance/data_quality.jl)
# Defaults OpenDSS substitutes for missing fields; flagged so users know a
# value came from a tool default rather than real data. Tune to a utility's
# house standards when importing their models.
# ---------------------------------------------------------------------------
[provenance.dss_defaults]
normamps = 400.0
emergamps = 600.0
xhl_pu = 0.07            # transformer xhl = 7 %
rw_pu = 0.004            # %r = 0.2 per winding, two windings
pf = 0.88               # load power factor whose tan(acos(pf)) is fingerprinted
basekv_v = 115000.0     # basekv default (V, line-to-line)
kv_v = 12470.0          # kv default (V, line-to-line)

# Switch-like (near-zero-impedance) line detection
[provenance.switch_like]
z_per_m = 1e-6          # Ω/m on all diagonals
z_total = 1e-4          # Ω effective (Z·length) on all diagonals

# ---------------------------------------------------------------------------
# Augmentation: voltage-level snapping  (augmentation/voltage_bounds.jl)
#
# When enabled, augment_case snaps each bus's derived nominal voltage to the
# nearest standardised level (IEC 60038 / ANSI C84.1) before computing voltage
# bounds, and writes the snapped value back as bus["v_declared"]. This fixes
# imported cases whose LV transformers are rated 240/250 V but whose bounds
# should be referenced to the standard 230 V. A bus that already carries an
# explicit v_declared is never re-snapped.
#
# Snap rule: nearest standard level within the relative `tolerance` band; a
# value outside every band is left unchanged (so genuinely non-standard buses
# are preserved). Off by default — no behaviour change unless enabled.
#
# Levels are PHASE-TO-NEUTRAL (per-conductor) volts, matching how v_nom is
# reported. The familiar line-to-line name is given in a comment in the preset
# table; custom `levels` must also be phase-to-neutral (L-L ÷ √3).
# ---------------------------------------------------------------------------
[augment.voltage_snap]
enabled = false         # opt-in
preset = "IEC_50Hz"     # "IEC_50Hz" | "ANSI_60Hz" | "none" (use only `levels`)
tolerance = 0.10        # snap only if |v / std − 1| ≤ tolerance
levels = []             # extra phase-to-neutral volts, merged with the preset

# ---------------------------------------------------------------------------
# Augmentation: smart-inverter (Volt-var / Volt-watt) default characteristics
#
# When enabled, augment_case fills any volt_var/volt_watt sub-object that an
# inverter's control_profile declares but leaves blank, using the region preset
# selected by `region`. Explicit values already present are never overwritten.
# Off by default — no behaviour change unless enabled.
#
# Voltages are PHASE-TO-NEUTRAL SI volts (nominal 230 V). q_limits/p_limits are
# fractions of s_max (VA_FRACTION). Presets are the AS/NZS 4777.2:2020 default
# response-mode settings. Queensland (Energy Queensland) mandates "Australia A".
#
# NOTE: Aus_A is the reviewed Queensland default; Aus_B / Aus_C / NZ are included
# for region selection but should be confirmed against the current standard
# before use in a study.
# ---------------------------------------------------------------------------
[augment.smart_inverter]
enabled = false         # opt-in
region  = "Aus_A"       # "Aus_A" | "Aus_B" | "Aus_C" | "NZ"

# ── Australia A (Queensland default, AS/NZS 4777.2:2020) ────────────────────
[augment.smart_inverter.regions.Aus_A.volt_var]
voltage_reference = "PN_PER_PHASE"
breakpoints = [207.0, 220.0, 240.0, 258.0]   # [V1,V2,V3,V4]
q_limits    = [-0.60, 0.44]                  # [absorb (≤0), inject (≥0)]
q_unit      = "VA_FRACTION"
q_ref       = "VAR_MAX"
[augment.smart_inverter.regions.Aus_A.volt_watt]
voltage_reference = "PN_PER_PHASE"
breakpoints = [253.0, 260.0]                 # [V5,V6]
p_limits    = [0.20, 1.00]                   # [p_low, p_high]
p_unit      = "VA_FRACTION"
p_ref       = "S_MAX"

# ── Australia B (AS/NZS 4777.2:2020 — verify) ──────────────────────────────
[augment.smart_inverter.regions.Aus_B.volt_var]
voltage_reference = "PN_PER_PHASE"
breakpoints = [205.0, 220.0, 235.0, 255.0]
q_limits    = [-0.40, 0.30]
q_unit      = "VA_FRACTION"
q_ref       = "VAR_MAX"
[augment.smart_inverter.regions.Aus_B.volt_watt]
voltage_reference = "PN_PER_PHASE"
breakpoints = [250.0, 260.0]
p_limits    = [0.20, 1.00]
p_unit      = "VA_FRACTION"
p_ref       = "S_MAX"

# ── Australia C (AS/NZS 4777.2:2020 — verify) ──────────────────────────────
[augment.smart_inverter.regions.Aus_C.volt_var]
voltage_reference = "PN_PER_PHASE"
breakpoints = [215.0, 230.0, 240.0, 255.0]
q_limits    = [-0.60, 0.44]
q_unit      = "VA_FRACTION"
q_ref       = "VAR_MAX"
[augment.smart_inverter.regions.Aus_C.volt_watt]
voltage_reference = "PN_PER_PHASE"
breakpoints = [253.0, 260.0]
p_limits    = [0.20, 1.00]
p_unit      = "VA_FRACTION"
p_ref       = "S_MAX"

# ── New Zealand (AS/NZS 4777.2:2020 — verify) ──────────────────────────────
[augment.smart_inverter.regions.NZ.volt_var]
voltage_reference = "PN_PER_PHASE"
breakpoints = [207.0, 220.0, 235.0, 244.0]
q_limits    = [-0.60, 0.60]
q_unit      = "VA_FRACTION"
q_ref       = "VAR_MAX"
[augment.smart_inverter.regions.NZ.volt_watt]
voltage_reference = "PN_PER_PHASE"
breakpoints = [242.0, 250.0]
p_limits    = [0.20, 1.00]
p_unit      = "VA_FRACTION"
p_ref       = "S_MAX"
